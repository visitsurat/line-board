<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>เข้าสู่ระบบจองเยี่ยม-วีดีโอคอล (Line)...</title>
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        /* โทนสีหลัก LINE Style */
        :root { 
            --line-primary: #06C755; /* สีเขียวของ LINE */
            --line-hover: #05B34C; 
            --line-bg: #F5F9F5; /* พื้นหลังสีเขียวอ่อนๆ */
            --line-dark: #002240; 
        }
        
        body, html {
            height: 100%;
            margin: 0;
            padding: 0;
            font-family: 'Sarabun', sans-serif; /* เปลี่ยนมาใช้ฟอนต์สารบรรณให้เป็นมาตรฐานเดียวกัน */
            background-color: var(--line-bg);
            display: flex;
            justify-content: center;
            align-items: center;
            color: var(--line-dark);
        }
        
        /* กล่องการ์ดโชว์ข้อความต้อนรับ */
        .redirect-card {
            background-color: white;
            padding: 40px 30px;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0, 185, 0, 0.1);
            text-align: center;
            width: 85%;
            max-width: 400px;
            border-top: 6px solid var(--line-primary);
        }

        /* ดีไซน์ตัวหมุน (Spinner) */
        .spinner {
            width: 50px;
            height: 50px;
            border: 5px solid #e8f5e9;
            border-top: 5px solid var(--line-primary);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px auto;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .title {
            font-size: 1.3rem;
            font-weight: 600;
            margin-bottom: 10px;
            color: var(--line-primary); /* ให้ชื่อระบบเป็นสีเขียว */
        }

        .subtitle {
            font-size: 0.95rem;
            color: #6c757d;
            margin-bottom: 25px;
            line-height: 1.5;
        }

        /* ปุ่มเผื่อกรณีที่เบราว์เซอร์ลูกค้าไม่ยอม Redirect อัตโนมัติ */
        .manual-btn {
            background-color: var(--line-primary);
            color: white;
            border: none;
            padding: 12px 25px;
            border-radius: 25px; /* ทำให้ปุ่มมีความโค้งมนเหมือนปุ่มใน LINE */
            font-size: 0.95rem;
            font-weight: bold;
            cursor: pointer;
            text-decoration: none;
            display: inline-block;
            transition: 0.3s;
            box-shadow: 0 4px 6px rgba(6, 199, 85, 0.2);
        }
        .manual-btn:hover {
            background-color: var(--line-hover);
        }
    </style>

    <script>
        // ========================================================
        // นำลิงก์ Web App (Exec) ของคุณมาวางในเครื่องหมายคำพูดด้านล่างนี้เลยครับ
        // ========================================================
        var googleWebAppUrl = "https://script.google.com/macros/s/AKfycbz70JgDQgzXJI54ySzaGnUNGHlZKnwfI5WYiDL5neKCp6L_mQqZyXMOpdxE5ybip9dL/exec?page=board";
        
        window.onload = function() {
            // สั่งหน่วงเวลาให้โชว์หน้าต้อนรับนิดนึง (ประมาณ 1.5 วินาที) จะได้ดูสมูท
            setTimeout(function() {
                // คำสั่ง replace จะพาหน้าเว็บกระโดดไปเลย โดยไม่ทิ้งประวัติในปุ่ม Back (กันญาติกด Back กลับมาเจอหน้าขาว)
                window.location.replace(googleWebAppUrl);
            }, 1500); 
        };
    </script>
</head>
<body>

    <div class="redirect-card">
        <div class="spinner"></div>
        <div class="title">ระบบจองเยี่ยม-วีดีโอคอล (LINE)</div>
        <div class="subtitle">ระบบกำลังพาท่านเข้าสู่หน้าจอหลักอย่างปลอดภัย<br>กรุณารอสักครู่...</div>
        
        <!-- ซ่อนปุ่มนี้ไว้เผื่อฉุกเฉินเท่านั้น -->
        <a href="https://script.google.com/macros/s/AKfycbz70JgDQgzXJI54ySzaGnUNGHlZKnwfI5WYiDL5neKCp6L_mQqZyXMOpdxE5ybip9dL/exec?page=board" class="manual-btn">คลิกที่นี่หากระบบไม่เปลี่ยนหน้าอัตโนมัติ</a>
    </div>

</body>
</html>
