<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <!-- [สำคัญที่สุด] บรรทัดนี้คือเวทมนตร์ที่จะสั่ง Chrome/LINE ให้ขยายจอ 100% -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>ระบบคิวเยี่ยมวีดีโอคอล (LINE) - เรือนจำกลางสุราษฎร์ธานี</title>
    
    <!-- โหลดฟอนต์ Sarabun เพื่อความสวยงามมาตรฐาน -->
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@400;600;700&display=swap" rel="stylesheet">
    
    <style>
        /* โทนสี LINE Style */
        :root { 
            --line-primary: #00B900; 
            --line-bg: #F5F9F5; 
            --line-dark: #002240; 
        }

        /* ล้างค่าขอบจอทั้งหมดให้เหลือ 0 */
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden; /* ซ่อนแถบเลื่อนของหน้าเว็บหลัก */
            background-color: var(--line-bg); /* สีพื้นหลังกลืนกับเว็บจริง */
            font-family: 'Sarabun', sans-serif;
        }
        
        /* สั่งให้ iframe ขยายเต็ม 100% ของจอมือถือเป๊ะๆ */
        iframe {
            width: 100%;
            height: 100%;
            border: none;
            display: block;
        }

        /* ทำฉากโหลด (Loader) สวยๆ คั่นเวลารอ Google Apps Script ทำงาน */
        #loader-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: var(--line-bg);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            transition: opacity 0.5s ease;
        }

        /* ดีไซน์ตัวหมุนสีเขียว LINE */
        .spinner {
            width: 55px;
            height: 55px;
            border: 5px solid #e8f5e9;
            border-top: 5px solid var(--line-primary);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-bottom: 20px;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .loading-title {
            color: var(--line-primary);
            font-weight: 700;
            font-size: 1.3rem;
            margin-bottom: 5px;
        }

        .loading-text {
            color: #6c757d;
            font-weight: 400;
            font-size: 0.95rem;
            text-align: center;
            line-height: 1.5;
        }
    </style>
</head>
<body>

    <!-- ฉากโหลด (จะหายไปเมื่อเว็บตัวจริงโหลดเสร็จ) -->
    <div id="loader-overlay">
        <div class="spinner"></div>
        <div class="loading-title">ระบบคิวเยี่ยมวีดีโอคอล (LINE)</div>
        <div class="loading-text">กำลังโหลดระบบคิวเยี่ยมวีดีโอคอล (LINE)<br>กรุณารอสักครู่...</div>
    </div>

    <!-- ฝังลิงก์ Google Apps Script ไว้ข้างในนี้ -->
    <iframe 
        id="appFrame"
        src="https://script.google.com/macros/s/AKfycbz70JgDQgzXJI54ySzaGnUNGHlZKnwfI5WYiDL5neKCp6L_mQqZyXMOpdxE5ybip9dL/exec?page=board" 
        allow="camera; microphone"
        onload="hideLoader()">
    </iframe>

    <script>
        // ฟังก์ชันซ่อนฉากโหลดเมื่อเว็บใน iframe โหลดเสร็จสมบูรณ์
        function hideLoader() {
            const loader = document.getElementById('loader-overlay');
            loader.style.opacity = '0';
            setTimeout(() => {
                loader.style.display = 'none';
            }, 500);
        }
    </script>
</body>
</html>
